name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.6"       # Pin uv version — update when bumping uv.lock
          python-version: "3.12"
          enable-cache: true      # Cache uv's package cache across runs

      - name: Install dependencies
        # --frozen: abort if uv.lock is out of sync (CI must not silently re-resolve)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --tb=short -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-demo-api:${{ github.sha }} .
